<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- 头部 -->
    <header class="header">
      <h1>📁 Tab Manager</h1>
      <div class="header-actions">
        <button id="btn-classify-all" class="btn-icon" title="一键分类所有标签">
          🤖
        </button>
        <button id="btn-add-category" class="btn-icon" title="新建分类">
          ➕
        </button>
        <button id="btn-settings" class="btn-icon" title="设置">
          ⚙️
        </button>
      </div>
    </header>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索标签或分类...">
    </div>

    <!-- 分类树 -->
    <div class="tree-container" id="tree-container">
      <!-- 动态渲染 -->
    </div>

    <!-- 未分类标签 -->
    <div class="uncategorized" id="uncategorized">
      <div class="category-header">
        <span class="category-name">📌 未分类</span>
        <span class="tab-count" id="uncategorized-count">0</span>
      </div>
      <div class="tabs-list" id="uncategorized-tabs">
        <!-- 动态渲染 -->
      </div>
    </div>
  </div>

  <!-- 新建分类对话框 -->
  <dialog id="dialog-add-category">
    <h2>新建分类</h2>
    <form id="form-add-category">
      <div class="form-group">
        <label for="category-name">分类名称</label>
        <input type="text" id="category-name" required>
      </div>
      <div class="form-group">
        <label for="category-parent">父分类</label>
        <select id="category-parent">
          <option value="root">根目录</option>
          <!-- 动态填充 -->
        </select>
      </div>
      <div class="form-group">
        <label for="category-domains">域名规则（逗号分隔）</label>
        <input type="text" id="category-domains" placeholder="例如: openai.com, chatgpt.com">
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel-category">取消</button>
        <button type="submit" class="btn-primary">创建</button>
      </div>
    </form>
  </dialog>

  <!-- 移动标签对话框（新增） -->
  <dialog id="dialog-move">
    <h2>📁 移动标签</h2>
    <form id="form-move">
      <input type="hidden" id="move-tab-id">
      
      <div class="form-group">
        <label for="move-target-category">选择目标分类</label>
        <select id="move-target-category">
          <option value="">-- 选择分类 --</option>
          <!-- 动态填充 -->
        </select>
      </div>
      
      <div class="form-group">
        <label>或者创建新分类</label>
        <input type="text" id="move-new-category" placeholder="例如: 人工智能 > LLM > 智谱">
        <small style="color: #666; font-size: 11px;">
          用 > 分隔层级，会自动创建不存在的分类
        </small>
      </div>
      
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel-move">取消</button>
        <button type="submit" class="btn-primary">移动</button>
      </div>
    </form>
  </dialog>

  <!-- 设置对话框 -->
  <dialog id="dialog-settings">
    <h2>⚙️ 设置</h2>
    <form id="form-settings">
      <div class="form-group">
        <label for="setting-api-key">DeepSeek API Key</label>
        <input type="password" id="setting-api-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label for="setting-api-endpoint">API Endpoint</label>
        <input type="text" id="setting-api-endpoint" value="https://api.deepseek.com/v1/chat/completions">
      </div>
      <div class="form-group">
        <label for="setting-model">模型</label>
        <input type="text" id="setting-model" value="deepseek-chat">
      </div>
      <div class="form-group">
        <small style="color: #666; line-height: 1.6;">
          💡 使用说明：<br>
          • 点击顶部 🤖 一键分类所有标签<br>
          • 或点击单个标签的 🤖 分类<br>
          • 点击 📁 手动移动到指定分类<br>
          • 相同网页自动缓存，不重复调用API<br>
          • 约 100 次分类 ≈ 1.4 分
        </small>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel-settings">取消</button>
        <button type="submit" class="btn-primary">保存</button>
      </div>
    </form>
    
    <hr style="margin: 16px 0; border: none; border-top: 1px solid #e0e0e0;">
    
    <button id="btn-clear-data" class="btn-danger" style="width: 100%;">
      🗑️ 清空所有数据
    </button>
  </dialog>

  <script src="popup.js"></script>
</body>
</html>
